spring.application.name=auca-archive-backend
spring.datasource.url=jdbc:postgresql://localhost:5432/AUCA_ARCHIVE_DB
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=aime1234
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
archive.storage-root=storage
archive.encryption.enabled=true
# Set a 32-byte base64 key in production: openssl rand -base64 32
archive.encryption.key-base64=
archive.encryption.passphrase=auca-archive-dev-key-change-me
spring.elasticsearch.uris=http://localhost:9200
# When true, global search uses Elasticsearch when reachable; otherwise falls back to database search.
archive.search.elasticsearch.enabled=true
archive.document-scan.enabled=true
archive.document-scan.min-text-chars=60
archive.document-scan.max-ocr-pages=2
archive.document-scan.ocr-dpi=150
archive.ocr.enabled=true
# Set this if Tesseract is installed, e.g. C:/Program Files/Tesseract-OCR/tessdata
archive.ocr.tessdata-path=
server.port=${SERVER_PORT:8081}
