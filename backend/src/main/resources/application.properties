spring.application.name=auca-archive-backend

# ── PostgreSQL database ──────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/aucaarchivedb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=Akizeisra123

# ── Disable Elasticsearch auto-configuration (no ES instance running) ─────────
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchRepositoriesAutoConfiguration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# ── Storage ───────────────────────────────────────────────────────────────────
archive.storage-root=storage
archive.encryption.enabled=false
archive.encryption.key-base64=
archive.encryption.passphrase=auca-archive-dev-key-change-me

# ── Elasticsearch (disabled — falls back to DB search) ────────────────────────
spring.elasticsearch.uris=http://localhost:9200
archive.search.elasticsearch.enabled=false

# ── OCR / Document scan (disabled — no Tesseract required) ───────────────────
archive.document-scan.enabled=false
archive.document-scan.min-text-chars=60
archive.document-scan.max-ocr-pages=2
archive.document-scan.ocr-dpi=150
archive.ocr.enabled=false
archive.ocr.tessdata-path=

server.port=${SERVER_PORT:8081}
