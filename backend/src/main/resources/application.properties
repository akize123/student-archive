spring.application.name=auca-archive-backend

# ── PostgreSQL database ──────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/aucaarchivedb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=Akizeisra123

# ── Disable Elasticsearch auto-configuration (no ES instance running) ─────────
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchRepositoriesAutoConfiguration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# ── Storage ───────────────────────────────────────────────────────────────────
archive.storage-root=storage
# Encrypt stored PDF/ZIP documents at rest (AES-256-GCM). Existing plaintext files remain readable.
archive.encryption.enabled=true
archive.encryption.key-base64=
archive.encryption.passphrase=auca-archive-dev-key-change-me

# ── Transport & platform security ─────────────────────────────────────────────
# Set true in production behind HTTPS/TLS (direct SSL or reverse proxy with X-Forwarded-Proto).
archive.security.require-https=false
server.forward-headers-strategy=framework
# Production TLS example (uncomment and provide keystore):
# server.ssl.enabled=true
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=change-me
# server.ssl.key-store-type=PKCS12

# ── Malware scanning ──────────────────────────────────────────────────────────
archive.malware-scan.enabled=true
# Optional ClamAV daemon integration:
# archive.malware-scan.clamav-host=127.0.0.1
# archive.malware-scan.clamav-port=3310

# ── Elasticsearch (disabled — falls back to DB search) ────────────────────────
spring.elasticsearch.uris=http://localhost:9200
# When true, global search uses Elasticsearch when reachable; otherwise falls back to database search.
archive.search.elasticsearch.enabled=false
archive.student.storage-limit-bytes=268435456
archive.student.max-upload-size-bytes=5242880
archive.document-scan.enabled=true
archive.document-scan.min-text-chars=60
archive.document-scan.max-ocr-pages=10
archive.document-scan.ocr-dpi=150
archive.ocr.enabled=false
archive.ocr.tessdata-path=

# ── Multipart / folder import ─────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=55MB
spring.servlet.multipart.max-request-size=60MB
archive.import.max-zip-bytes=52428800

# ── FYP book reservations (students only) ─────────────────────────────────────
archive.reservation.ttl-minutes=20
archive.reservation.max-concurrent-per-document=3
archive.reservation.expiry-check-ms=60000

server.port=${SERVER_PORT:8081}
server.address=0.0.0.0
